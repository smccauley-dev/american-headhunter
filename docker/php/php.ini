upload_max_filesize = 100M
post_max_size = 100M
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
date.timezone = UTC

; Opcache — revalidate every 2s instead of every request (big win on Windows bind mounts)
; Run `php artisan optimize:clear` after PHP file edits if changes aren't reflected.
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.fast_shutdown = 1
